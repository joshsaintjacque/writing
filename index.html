<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writing Room</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="rail" aria-label="Document controls">
        <div>
          <p class="eyebrow">Writing Room</p>
          <h1 id="draftTitle">Untitled draft</h1>
        </div>

        <div class="metrics" aria-label="Writing metrics">
          <div>
            <span id="wordCount">0</span>
            <small>words</small>
          </div>
          <div>
            <span id="readTime">1</span>
            <small>min read</small>
          </div>
        </div>

        <div class="controls">
          <button id="clearDraft" type="button">New draft</button>
        </div>
      </aside>

      <section class="workspace" aria-label="Markdown writing workspace">
        <label class="sr-only" for="editor">Inline markdown editor</label>
        <article
          id="editor"
          class="page block-editor"
          role="textbox"
          aria-multiline="true"
          aria-describedby="editorHint"
          tabindex="0"
        ></article>
        <p id="editorHint" class="hint">
          Markdown appears only on the active line. Click any line to edit its source.
        </p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
