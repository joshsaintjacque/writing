<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writing Room</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="Markdown writing workspace">
        <label class="sr-only" for="editor">Inline markdown editor</label>
        <article
          id="editor"
          class="page block-editor"
          role="textbox"
          aria-multiline="true"
          tabindex="0"
        ></article>

        <div class="status-bar" aria-label="Document status and actions">
          <div class="metrics" aria-label="Writing metrics">
            <div>
              <span id="wordCount">0</span>
              <small>words</small>
            </div>
            <div>
              <span id="readTime">1</span>
              <small>min read</small>
            </div>
          </div>
          <button id="clearDraft" type="button">New draft</button>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
